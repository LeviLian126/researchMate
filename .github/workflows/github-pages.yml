name: researchmate-docs-pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the approved ref
        uses: actions/checkout@v6
      - name: Configure Pages metadata
        uses: actions/configure-pages@v5
      - name: Upload static documentation
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static documentation
        id: deployment
        uses: actions/deploy-pages@v4
