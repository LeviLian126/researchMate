# Packages the pull request source tree for an authorized local implementation workspace.
name: source-snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  package-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the pull request source
        uses: actions/checkout@v4
      - name: Build a source-only archive
        run: tar --exclude=.git --exclude=node_modules --exclude='**/.next' -czf researchmate-source.tgz .
      - name: Upload the source archive
        uses: actions/upload-artifact@v4
        with:
          name: researchmate-source
          path: researchmate-source.tgz
          if-no-files-found: error
          retention-days: 1
