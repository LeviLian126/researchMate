name: researchmate-cloudflare-release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected GitHub environment that holds the Cloudflare deploy token
        required: true
        type: choice
        options: [Production]

concurrency:
  group: researchmate-cloudflare-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -r requirements-dev.txt
      - run: npm ci
      - run: npm run check:all
      - name: Build the Cloudflare Worker bundle
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: npm --workspace @researchmate/web exec opennextjs-cloudflare -- build

  deploy-public-demo:
    needs: quality-gate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Deploy the public static-demo runtime to Cloudflare Workers
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: npx opennextjs-cloudflare build && npx wrangler deploy --config wrangler.jsonc
