components:
  schemas:
    AskRequest:
      properties:
        project_id:
          type: string
          format: uuid
          title: Project Id
        message:
          type: string
          maxLength: 8000
          minLength: 1
          title: Message
        selected_mode:
          $ref: '#/components/schemas/SourceMode'
          default: auto
      type: object
      required:
      - project_id
      - message
      title: AskRequest
    AskResponse:
      properties:
        run_id:
          type: string
          format: uuid
          title: Run Id
        answer:
          type: string
          maxLength: 16000
          minLength: 1
          title: Answer
        mode:
          $ref: '#/components/schemas/SourceMode'
        sources:
          $ref: '#/components/schemas/SourceSummary'
        citations:
          items:
            $ref: '#/components/schemas/Citation'
          type: array
          maxItems: 80
          title: Citations
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        validation_status:
          type: string
          enum:
          - passed
          - failed
          - retrying
          title: Validation Status
      type: object
      required:
      - run_id
      - answer
      - mode
      - sources
      - trace_id
      - validation_status
      title: AskResponse
    Citation:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        source_type:
          $ref: '#/components/schemas/SourceType'
        document_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Document Id
        chunk_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Chunk Id
        page_no:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Page No
        slide_no:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Slide No
        url:
          anyOf:
          - type: string
            maxLength: 2048
          - type: 'null'
          title: Url
        quote:
          type: string
          maxLength: 1200
          minLength: 1
          title: Quote
        claim_id:
          anyOf:
          - type: string
            maxLength: 120
          - type: 'null'
          title: Claim Id
      type: object
      required:
      - id
      - source_type
      - quote
      title: Citation
    CurrentUser:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        email:
          anyOf:
          - type: string
            maxLength: 320
          - type: 'null'
          title: Email
        role:
          type: string
          enum:
          - user
          - developer
          - admin
          title: Role
          default: user
      type: object
      required:
      - id
      title: CurrentUser
    DeveloperTrace:
      properties:
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        user_id:
          type: string
          format: uuid
          title: User Id
        project_id:
          type: string
          format: uuid
          title: Project Id
        run_id:
          type: string
          format: uuid
          title: Run Id
        execution_plan:
          $ref: '#/components/schemas/ExecutionPlan'
        router_reason:
          type: string
          maxLength: 2000
          title: Router Reason
        retrieved_chunks:
          items:
            additionalProperties: true
            type: object
          type: array
          maxItems: 80
          title: Retrieved Chunks
        tool_calls:
          items:
            $ref: '#/components/schemas/ToolCallTrace'
          type: array
          maxItems: 40
          title: Tool Calls
        validation_result:
          additionalProperties: true
          type: object
          title: Validation Result
        latency_ms:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Latency Ms
        token_usage:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Token Usage
        errors:
          items:
            type: string
          type: array
          maxItems: 20
          title: Errors
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - trace_id
      - user_id
      - project_id
      - run_id
      - execution_plan
      - router_reason
      - validation_result
      - created_at
      title: DeveloperTrace
    Difficulty:
      type: string
      enum:
      - easy
      - medium
      - hard
      title: Difficulty
    DocumentRecord:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        user_id:
          type: string
          format: uuid
          title: User Id
        project_id:
          type: string
          format: uuid
          title: Project Id
        filename:
          type: string
          title: Filename
        file_type:
          type: string
          title: File Type
        mime_type:
          type: string
          title: Mime Type
        size_bytes:
          type: integer
          title: Size Bytes
        status:
          $ref: '#/components/schemas/DocumentStatus'
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
        expires_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expires At
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        deleted_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Deleted At
      type: object
      required:
      - id
      - user_id
      - project_id
      - filename
      - file_type
      - mime_type
      - size_bytes
      - status
      - created_at
      - updated_at
      title: DocumentRecord
    DocumentStatus:
      type: string
      enum:
      - uploaded
