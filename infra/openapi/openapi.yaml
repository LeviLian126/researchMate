components:
  schemas:
    AskRequest:
      properties:
        project_id:
          type: string
          format: uuid
          title: Project Id
        message:
          type: string
          maxLength: 8000
          minLength: 1
          title: Message
        selected_mode:
          $ref: '#/components/schemas/SourceMode'
          default: auto
      type: object
      required:
      - project_id
      - message
      title: AskRequest
    AskResponse:
      properties:
        run_id:
          type: string
          format: uuid
          title: Run Id
        answer:
          type: string
          maxLength: 16000
          minLength: 1
          title: Answer
        mode:
          $ref: '#/components/schemas/SourceMode'
        sources:
          $ref: '#/components/schemas/SourceSummary'
        citations:
          items:
            $ref: '#/components/schemas/Citation'
          type: array
          maxItems: 80
          title: Citations
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        validation_status:
          type: string
          enum:
          - passed
          - failed
          - retrying
          title: Validation Status
      type: object
      required:
      - run_id
      - answer
      - mode
      - sources
      - trace_id
      - validation_status
      title: AskResponse
    Citation:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        source_type:
          $ref: '#/components/schemas/SourceType'
        document_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Document Id
        chunk_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Chunk Id
        page_no:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Page No
        slide_no:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Slide No
        url:
          anyOf:
          - type: string
            maxLength: 2048
          - type: 'null'
          title: Url
        quote:
          type: string
          maxLength: 1200
          minLength: 1
          title: Quote
        claim_id:
          anyOf:
          - type: string
            maxLength: 120
          - type: 'null'
          title: Claim Id
      type: object
      required:
      - id
      - source_type
      - quote
      title: Citation
    ClaimListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/ClaimSummary'
          type: array
          title: Items
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      type: object
      required:
      - items
      title: ClaimListResponse
    ClaimRelationListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/ClaimRelationSummary'
          type: array
          title: Items
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      type: object
      required:
      - items
      title: ClaimRelationListResponse
    ClaimRelationSummary:
      properties:
        source_claim_id:
          type: string
          format: uuid
          title: Source Claim Id
        target_claim_id:
          type: string
          format: uuid
          title: Target Claim Id
        relation:
          type: string
          enum:
          - supports
          - contradicts
          - duplicates
          title: Relation
        confidence:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Confidence
        rationale_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Rationale Summary
        source_text:
          type: string
          title: Source Text
        target_text:
          type: string
          title: Target Text
      type: object
      required:
      - source_claim_id
      - target_claim_id
      - relation
      - confidence
      - source_text
      - target_text
      title: ClaimRelationSummary
    ClaimSummary:
      properties:
        claim_id:
          type: string
          format: uuid
          title: Claim Id
        text:
          type: string
          title: Text
        stance:
          type: string
          enum:
          - supports
          - opposes
          - neutral
          title: Stance
        confidence:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Confidence
        review_status:
          type: string
          enum:
          - pending
          - accepted
          - edited
          - rejected
          - invalidated
          title: Review Status
        evidence_count:
          type: integer
          minimum: 0.0
          title: Evidence Count
        support_count:
          type: integer
          minimum: 0.0
          title: Support Count
        contradiction_count:
          type: integer
          minimum: 0.0
          title: Contradiction Count
        duplicate_count:
          type: integer
          minimum: 0.0
          title: Duplicate Count
        source_version:
          type: integer
          minimum: 1.0
          title: Source Version
      type: object
      required:
      - claim_id
      - text
      - stance
      - confidence
      - review_status
      - evidence_count
      - support_count
      - contradiction_count
      - duplicate_count
      - source_version
      title: ClaimSummary
    CurrentUser:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        email:
          anyOf:
          - type: string
            maxLength: 320
          - type: 'null'
          title: Email
        role:
          type: string
          enum:
          - user
          - developer
          - admin
          title: Role
          default: user
      type: object
      required:
      - id
      title: CurrentUser
    DeveloperTrace:
      properties:
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        user_id:
          type: string
          format: uuid
          title: User Id
        project_id:
          type: string
          format: uuid
          title: Project Id
        run_id:
          type: string
          format: uuid
          title: Run Id
        execution_plan:
          $ref: '#/components/schemas/ExecutionPlan'
        router_reason:
          type: string
          maxLength: 2000
          title: Router Reason
        retrieved_chunks:
          items:
            additionalProperties: true
            type: object
          type: array
          maxItems: 80
          title: Retrieved Chunks
        tool_calls:
          items:
            $ref: '#/components/schemas/ToolCallTrace'
          type: array
          maxItems: 40
          title: Tool Calls
        validation_result:
          additionalProperties: true
          type: object
          title: Validation Result
        latency_ms:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Latency Ms
        token_usage:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Token Usage
        errors:
          items:
            type: string
          type: array
          maxItems: 20
          title: Errors
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - trace_id
      - user_id
      - project_id
      - run_id
      - execution_plan
      - router_reason
      - validation_result
      - created_at
      title: DeveloperTrace
    Difficulty:
      type: string
      enum:
      - easy
      - medium
      - hard
      title: Difficulty
    DocumentRecord:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        user_id:
          type: string
          format: uuid
          title: User Id
        project_id:
          type: string
          format: uuid
          title: Project Id
        filename:
          type: string
          title: Filename
        file_type:
          type: string
          title: File Type
        mime_type:
          type: string
          title: Mime Type
        size_bytes:
          type: integer
          title: Size Bytes
        status:
          $ref: '#/components/schemas/DocumentStatus'
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
        expires_at:
          anyOf:
          - type: string
